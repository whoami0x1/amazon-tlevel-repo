<!DOCTYPE html>
<html>
  <head>
    <title>Amazon T-level Explore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/NavBar.js"></script>
  </head>
  <body class="register-page-body">
        <nav-bar></nav-bar>

        <div class="eop-form-wrapper">
          <div class="eop-form-container">
            <h2 class="register-interest-title">Register Interest</h2>
            <p class="form-labels" id="result-text"></p>

            <div class="field">
              <label class="form-labels">Name</label>
              <input class="input-box" id="name-field" type="text" placeholder="Your name">
              <p class="name-error-message" id="nameError"><img class="red-warning-icon" src="amazon-images/red-warning-error.png">Enter your name</p>
            </div>

            <div class="field">
              <label class="form-labels">E-mail</label>
              <input class="input-box" id="email-field" type="text" placeholder="Your email address">
              <p class="email-error-message" id="emailError"><img class="red-warning-icon" src="amazon-images/red-warning-error.png">Enter your email</p>
            </div>

            <div class="field">
              <label for="courses" class="form-labels">Course</label>
              <select name="courses" class="courses" id="courses">
                <option value="finance-tlevel">Finance T-Level</option>
                <option value="digital-tlevel">Digital T-Level</option>
                <option value="business-tlevel">Business T-Level</option>
                <option value="engineering-tlevel">Engineering T-Level</option>
                <option value="media-tlevel">Media T-Level</option>
              </select>
              <p class="courses-error-message" id="courses-error"><img class="red-warning-icon" src="amazon-images/red-warning-error.png">Select a course</p>
            </div>

            <div class="field">
              <label class="form-labels">Why this course?</label>
              <input class="input-box" id="details-field" type="text" placeholder="Reason for choosing this course">
              <p class="details-error-message" id="detailsError"><img class="red-warning-icon" src="amazon-images/red-warning-error.png">Provide a reason for why you chose this course</p>
            </div>

            <button class="eop-submit-button">Submit</button>
            <span class="loader" id="submit-loader"></span>
          </div>
        </div>

        <page-footer></page-footer>

        <script src="js/Footer.js"></script>
        <script src="js/main.js"></script>
  </body>
</html>
