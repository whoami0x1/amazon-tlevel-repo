<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Auth Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>Authentication Successful</h1>
    <p id="subheading">Check the console for the ID token.</p>
    <h3 id="redirectmsg"></h3>

    <script>
    const subheadingEle = document.getElementById('subheading');
    const redirectmsg = document.getElementById('redirectmsg');

    async function init() {
        const res = await fetch("http://localhost:5501/api/me", {
            credentials: "include"
        });

        const user = await res.json();

        console.log("USER:", user);

        const data = user.user;

        subheadingEle.textContent =
            `Logged in as ${data.username} / ${data.email}`;

        window.location.replace("http://localhost:5500/register-interest.html");
    }

    init();
    </script>
</body>
</html>
