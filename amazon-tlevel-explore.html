<!DOCTYPE html>
<html>
  <head>
    <title>Amazon T-level Explore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
       @font-face {
            font-family: 'Amazon Ember';
            font-weight: 300;
            src: url('Amazon_Typefaces_Complete_Font_Set_Mar2020/Amazon_Typefaces_Complete_Font_Set_Mar2020/Ember/AmazonEmber_Lt.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Amazon Ember';
            font-weight: 400;
            src: url('Amazon_Typefaces_Complete_Font_Set_Mar2020/Amazon_Typefaces_Complete_Font_Set_Mar2020/Ember/AmazonEmber_Rg.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Amazon Ember';
            font-weight: 700;
            src: url('Amazon_Typefaces_Complete_Font_Set_Mar2020/Amazon_Typefaces_Complete_Font_Set_Mar2020/Ember/AmazonEmber_Bd.ttf') format('truetype');
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Amazon Ember', 'sans-serif';
        }

        .tab-section {
          background-color: #1d2834;
          width: 100%;
          height: 70px;
          padding: 0 15px;
          display: flex;
          align-items: center;
        }

        .amazon-logo {
          margin-left: 30px;
          width: 75px;
          margin-top: 5px;
        }

        .amazon-tlevel-team-logo {
          display: inline-block;
          color: white;
          margin-left: 2px;
        }

        .tlevels-info {
          display: inline-block;
          color: white;
          margin-left: auto;
        }

        .fa-bars {
          color: white;
          font-size: 20px;
          margin-right: 20px;
          cursor: pointer;
        }

    </style>
  </head>
  <body>
    <div class="tab-section">
      <i class="fa-solid fa-bars"></i>
      <img class="amazon-logo" src="amazon-images/amazon-logo-1.png" alt="Amazon-Logo" style="background-color: transparent;">
      <p class="amazon-tlevel-team-logo">T-Level Team</p>
      <p class="tlevels-info">T-Levels <i class="fa-solid fa-caret-down"></i></p>
    </div>

    <div>

    </div>
  </body>
</html>
